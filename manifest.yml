modules:
  jira:globalPage:
    - key: team-gantt-page
      resource: main
      resolver:
        function: resolver
      title: Team Gantt
      layout: basic
      icon: icon.svg

  function:
    - key: resolver
      handler: index.handler

resources:
  - key: main
    path: static/gantt-app/build

app:
  runtime:
    name: nodejs22.x
  id: ari:cloud:ecosystem::app/fa18fadb-8536-4e8a-b8a3-86cf7a1f9068

permissions:
  scopes:
    - read:jira-work
    - write:jira-work
    - storage:app
