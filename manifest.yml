modules:
  jira:globalPage:
    - key: team-gantt-page
      resource: main
      resolver:
        function: resolver
      title: Team Gantt
      layout: basic
      icon: https://raw.githubusercontent.com/Setteler/team-gantt-forge/main/icon.svg

  jira:dashboardGadget:
    - key: team-gantt-gadget
      resource: main
      edit:
        resource: gadget
      resolver:
        function: resolver
      title: Team Gantt
      description: Embed a Team Gantt view (Gantt chart, List, or Project) directly on your dashboard.
      thumbnail: https://raw.githubusercontent.com/Setteler/team-gantt-forge/main/icon.png

  function:
    - key: resolver
      handler: index.handler

resources:
  - key: main
    path: static/gantt-app/build
  - key: gadget
    path: static/gadget/build

app:
  runtime:
    name: nodejs22.x
  id: ari:cloud:ecosystem::app/fa18fadb-8536-4e8a-b8a3-86cf7a1f9068

permissions:
  scopes:
    - read:jira-work
    - write:jira-work
    - storage:app
